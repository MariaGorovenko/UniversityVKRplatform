services:

  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-vkr_main}
    ports:
      - "5433:5432"  # внешний порт 5433, чтобы не конфликтовал с локальным postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s  # даём БД время на старт

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
#    depends_on:
#      auth-service:
#        condition: service_healthy  # ждём, пока auth-service станет healthy
#      topic-service:
#        condition: service_healthy

  auth-service:
    build:
      context: ../auth-service
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vkr_main}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=30  # можно вынести в .env позже
    volumes:
      - ../shared:/app/shared:ro  # подключаем общую библиотеку jwt_utils
    depends_on:
      postgres:
        condition: service_healthy
#    healthcheck:
#      test: ["CMD-SHELL", "python -c \"import requests; r=requests.get('http://localhost:8000/health'); r.raise_for_status()\""]
#      interval: 10s
#      timeout: 5s
#      retries: 5
#      start_period: 90s  # даём uvicorn + reload время стартовать

  topic-service:
    build:
      context: ../topic-service
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8002:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vkr_main}
    volumes:
      - ../shared:/app/shared:ro  # подключаем общую библиотеку
    depends_on:
      postgres:
        condition: service_healthy
#    healthcheck:
#      test: ["CMD-SHELL", "python -c \"import requests; r=requests.get('http://localhost:8000/health'); r.raise_for_status()\""]
#      interval: 10s
#      timeout: 5s
#      retries: 5
#      start_period: 90s

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin-data:/var/lib/pgadmin

volumes:
  pgdata:
  pgadmin-data: