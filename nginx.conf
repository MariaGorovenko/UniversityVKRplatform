server {
    listen 80;
    server_name vkr.example.com 192.168.1.100 localhost;  # подставь реальный домен/IP

    # Отдача фронтенда (static файлы из build)
    location / {
        root /path/to/frontend/build;  # путь к собранному React/Vite
        try_files $uri /index.html;
    }

    # Проксирование API
    location /api/auth/ {
        proxy_pass http://localhost:8001/;  # порт auth-service в Docker
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/topic/ {
        proxy_pass http://localhost:8002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Для теста
    location /api/test {
        return 200 "API is up";
    }
}